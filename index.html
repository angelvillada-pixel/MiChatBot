<!DOCTYPE html>
<html lang='es'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Mi Chatbot IA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e1b4b);
  display:flex;justify-content:center;
  align-items:center;height:100vh;
}
.chat{
  width:420px;height:620px;
  background:#1e293b;border-radius:24px;
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:0 30px 60px rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.08);
}
.header{
  padding:18px 20px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;gap:12px;
}
.avatar{
  width:42px;height:42px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  display:flex;align-items:center;
  justify-content:center;font-size:20px;
}
.header-info h3{color:white;font-size:15px;}
.header-info span{
  color:rgba(255,255,255,0.7);
  font-size:12px;display:flex;
  align-items:center;gap:5px;
}
.dot{
  width:7px;height:7px;
  background:#4ade80;border-radius:50%;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.clear-btn{
  margin-left:auto;
  background:rgba(255,255,255,0.15);
  border:none;color:white;
  padding:6px 12px;border-radius:12px;
  cursor:pointer;font-size:12px;
}
.clear-btn:hover{background:rgba(255,255,255,0.25);}
.msgs{
  flex:1;padding:20px;
  overflow-y:auto;
  display:flex;flex-direction:column;gap:14px;
}
.msgs::-webkit-scrollbar{width:4px;}
.msgs::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.15);
  border-radius:2px;
}
.msg{
  display:flex;gap:10px;
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;
  justify-content:center;
  font-size:15px;flex-shrink:0;
}
.bot .msg-avatar{background:linear-gradient(135deg,#6366f1,#8b5cf6);}
.user .msg-avatar{background:linear-gradient(135deg,#f59e0b,#ef4444);}
.bubble{
  max-width:78%;padding:11px 15px;
  border-radius:18px;font-size:14px;
  line-height:1.6;color:white;
}
.bot .bubble{
  background:#334155;
  border-bottom-left-radius:4px;
}
.user .bubble{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border-bottom-right-radius:4px;
}
.typing{
  display:none;align-items:center;
  gap:10px;padding:0 20px 10px;
}
.typing.show{display:flex;}
.typing-bubble{
  background:#334155;padding:12px 16px;
  border-radius:18px;
  border-bottom-left-radius:4px;
  display:flex;gap:5px;align-items:center;
}
.td{
  width:7px;height:7px;
  background:rgba(255,255,255,0.5);
  border-radius:50%;animation:td 1.2s infinite;
}
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}
@keyframes td{
  0%,60%,100%{transform:translateY(0)}
  30%{transform:translateY(-7px)}
}
.input-area{
  padding:14px;
  border-top:1px solid rgba(255,255,255,0.08);
  display:flex;gap:10px;align-items:center;
}
#inp{
  flex:1;padding:12px 18px;
  background:#0f172a;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:24px;color:white;
  font-size:14px;outline:none;
  transition:border 0.2s;
}
#inp:focus{border-color:#6366f1;}
#inp::placeholder{color:rgba(255,255,255,0.35);}
#btn{
  width:44px;height:44px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border:none;border-radius:50%;
  color:white;font-size:17px;
  cursor:pointer;transition:transform 0.2s;
  display:flex;align-items:center;justify-content:center;
}
#btn:hover{transform:scale(1.1);}
#btn:disabled{opacity:0.5;transform:none;cursor:not-allowed;}
</style>
</head>
<body>
<div class='chat'>

  <div class='header'>
    <div class='avatar'>🤖</div>
    <div class='header-info'>
      <h3>Asistente IA Personal</h3>
      <span><div class='dot'></div>En línea · LLaMA 3.1</span>
    </div>
    <button class='clear-btn' onclick='clearChat()'>🗑️ Limpiar</button>
  </div>

  <div class='msgs' id='msgs'>
    <div class='msg bot'>
      <div class='msg-avatar'>🤖</div>
      <div class='bubble'>¡Hola! Soy tu asistente personal con IA. ¿En qué puedo ayudarte hoy? 😊</div>
    </div>
  </div>

  <div class='typing' id='typing'>
    <div class='msg-avatar' style='width:32px;height:32px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0'>🤖</div>
    <div class='typing-bubble'>
      <div class='td'></div>
      <div class='td'></div>
      <div class='td'></div>
    </div>
  </div>

  <div class='input-area'>
    <input id='inp' placeholder='Escribe tu mensaje...'
           onkeypress="if(event.key==='Enter')send()"/>
    <button id='btn' onclick='send()'>➤</button>
  </div>

</div>
<script>
const sid = 'u' + Math.random().toString(36).slice(2,9);
const API = '';

async function send(){
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if(!txt) return;
  addMsg(txt,'user');
  inp.value='';
  setTyping(true);
  document.getElementById('btn').disabled=true;
  try{
    const r = await fetch(API+'/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:txt,session_id:sid})
    });
    const d = await r.json();
    setTyping(false);
    addMsg(d.response,'bot');
  }catch(e){
    setTyping(false);
    addMsg('⚠️ Error conectando con el servidor.','bot');
  }
  document.getElementById('btn').disabled=false;
  document.getElementById('inp').focus();
}

function addMsg(txt,who){
  const msgs=document.getElementById('msgs');
  const av=who==='bot'?'🤖':'👤';
  msgs.innerHTML+=`
    <div class='msg ${who}'>
      <div class='msg-avatar'>${av}</div>
      <div class='bubble'>${txt}</div>
    </div>`;
  msgs.scrollTop=msgs.scrollHeight;
}

function setTyping(show){
  const t=document.getElementById('typing');
  const m=document.getElementById('msgs');
  t.classList.toggle('show',show);
  if(show) m.appendChild(t);
  m.scrollTop=m.scrollHeight;
}

async function clearChat(){
  await fetch(API+'/clear',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({session_id:sid})
  });
  document.getElementById('msgs').innerHTML=`
    <div class='msg bot'>
      <div class='msg-avatar'>🤖</div>
      <div class='bubble'>Historial limpiado. ¡Nueva conversación! 😊</div>
    </div>`;
}
</script>
</body>
</html>
